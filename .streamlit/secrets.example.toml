# Copy these values into Streamlit Community Cloud > App settings > Secrets.
# Do not commit .streamlit/secrets.toml with real keys.

GOOGLE_API_KEY = "your-gemini-api-key"
GEMINI_MODEL = "gemini-3.5-flash"

# Optional: enables Whisper STT and OpenAI fallback LLM.
OPENAI_API_KEY = "your-openai-api-key"
OPENAI_MODEL = "gpt-5.5"
OPENAI_STT_MODEL = "gpt-4o-mini-transcribe"

# Optional: use MongoDB Atlas in production.
# If omitted, the app uses built-in seed data and uploaded/local files.
MONGO_URI = "mongodb+srv://user:password@cluster.example.mongodb.net/"
MONGO_DB_NAME = "LocalAssistantDB"
